<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shoppa - Offline</title>
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background: #f8f9fa;
        color: #191c1d;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        text-align: center;
      }
      .container {
        max-width: 400px;
      }
      h1 {
        font-family: 'Manrope', sans-serif;
        font-weight: 800;
        font-size: 2.5rem;
        color: #005147;
        margin-bottom: 1rem;
        line-height: 1.2;
      }
      p {
        font-size: 1rem;
        color: #3e4946;
        margin-bottom: 1.5rem;
      }
      .icon {
        font-size: 4rem;
        color: #005147;
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <span class="material-symbols-outlined icon">wifi_off</span>
      <h1>Offline Mode</h1>
      <p>You're currently offline. Some features may be limited. Please check your internet connection and try again.</p>
    </div>
  </body>
</html>
