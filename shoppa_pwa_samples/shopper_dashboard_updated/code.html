<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Shoppa | Shopper Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline-variant": "#bec9c5",
                        "primary-fixed-dim": "#83d5c5",
                        "inverse-on-surface": "#f0f1f2",
                        "tertiary-container": "#8f4c36",
                        "surface-container": "#edeeef",
                        "surface": "#f8f9fa",
                        "on-tertiary-container": "#ffcebf",
                        "surface-tint": "#006b5e",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed-variant": "#723521",
                        "surface-container-low": "#f3f4f5",
                        "on-tertiary-fixed": "#390b00",
                        "on-secondary-fixed-variant": "#2f4c46",
                        "secondary-fixed": "#c9e9e1",
                        "secondary-fixed-dim": "#adcdc5",
                        "tertiary": "#723521",
                        "inverse-primary": "#83d5c5",
                        "on-surface": "#191c1d",
                        "on-primary": "#ffffff",
                        "on-background": "#191c1d",
                        "tertiary-fixed-dim": "#ffb59e",
                        "secondary-container": "#c6e7de",
                        "tertiary-fixed": "#ffdbd0",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#2e3132",
                        "on-surface-variant": "#3e4946",
                        "primary-fixed": "#9ff2e1",
                        "surface-container-highest": "#e1e3e4",
                        "surface-dim": "#d9dadb",
                        "surface-container-high": "#e7e8e9",
                        "on-error": "#ffffff",
                        "background": "#f8f9fa",
                        "on-tertiary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "error": "#ba1a1a",
                        "on-secondary-fixed": "#01201b",
                        "surface-bright": "#f8f9fa",
                        "primary": "#005147",
                        "secondary": "#46645e",
                        "primary-container": "#006b5e",
                        "on-primary-fixed": "#00201b",
                        "surface-variant": "#e1e3e4",
                        "on-error-container": "#93000a",
                        "on-primary-fixed-variant": "#005046",
                        "outline": "#6e7976",
                        "on-secondary-container": "#4b6862",
                        "on-primary-container": "#95e8d8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "1.5rem",
                        "md": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    "boxShadow": {
                        "ambient": "0 20px 40px rgba(25, 28, 29, 0.06)"
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen pb-32">
<!-- TopAppBar from COMPONENTS_27 -->
<header class="fixed top-0 sticky z-50 w-full bg-white/80 dark:bg-slate-900/80 backdrop-blur-md shadow-ambient">
<div class="flex justify-between items-center px-4 h-16 w-full max-w-md mx-auto">
<button class="material-symbols-outlined text-emerald-900 dark:text-emerald-50 active:scale-95 transition-transform" data-icon="menu">menu</button>
<span class="font-manrope font-black tracking-tighter text-emerald-900 dark:text-emerald-50 text-2xl">Shoppa</span>
<div class="w-10 h-10 rounded-full overflow-hidden border border-emerald-900/10 active:scale-95 transition-transform">
<img alt="User profile avatar" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBFfgUzULD2sVcnFL_or3zl5GP5P9DHKImFId2CyFEOFfOMq6PR36dO5gaNVIBm_604B3JCU7Z4MAoHXrc-e9O2g_l4sCrgBDS4prO0nr89NmJN_J7Geg9jHqlDg_yMSntJVP6Fs9CICBXFW67D3r2Iw4TD7jFo6pW1vRfNaSIrydcF5amKlX5ujXqkXtaVZ7P5-ojGr9cGfybyL-JQ22K6j1e1mwTn7Gde7j-x343ZEI4thMagLl8CW-SSYAmxF46uAELeWC-xA2sv"/>
</div>
</div>
</header>
<main class="max-w-md mx-auto px-4 pt-4 space-y-6">
<!-- Welcome Section -->
<section class="py-2">
<p class="text-on-surface-variant font-medium text-sm">Good morning, Alex</p>
<h1 class="text-2xl font-extrabold text-primary tracking-tight">Your Dashboard</h1>
</section>
<!-- Active Shopping Session Card -->
<section class="relative overflow-hidden bg-emerald-900 rounded-xl p-6 shadow-lg text-white">
<div class="absolute top-0 right-0 p-4 opacity-10">
<span class="material-symbols-outlined text-8xl" data-icon="timer">timer</span>
</div>
<div class="relative z-10 flex flex-col gap-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-emerald-200" data-icon="timer" style="font-variation-settings: 'FILL' 1;">timer</span>
<span class="font-manrope font-extrabold text-xl">Shop Mode Active</span>
</div>
<p class="text-emerald-100/80 text-sm max-w-[200px]">Grocery Run: Whole Foods Market. 12 items remaining.</p>
<button class="w-full bg-white text-emerald-900 py-4 rounded-md font-bold text-base shadow-sm active:scale-95 transition-transform">
                    CONTINUE SHOPPING
                </button>
</div>
</section>
<!-- Today's Orders Summary -->
<section class="grid grid-cols-2 gap-4">
<div class="bg-surface-container-lowest p-5 rounded-xl flex flex-col gap-1 shadow-ambient border border-outline-variant/10">
<span class="text-primary font-black text-3xl">4</span>
<span class="text-on-surface-variant text-xs font-semibold uppercase tracking-widest">Active Orders</span>
</div>
<div class="bg-surface-container-lowest p-5 rounded-xl flex flex-col gap-1 shadow-ambient border border-outline-variant/10">
<span class="text-on-surface font-black text-3xl opacity-40">2</span>
<span class="text-on-surface-variant text-xs font-semibold uppercase tracking-widest">Pending</span>
</div>
</section>
<!-- Earnings Summary Widget -->
<section class="bg-surface-container-low p-6 rounded-xl space-y-4">
<div class="flex justify-between items-center">
<h3 class="font-bold text-lg text-on-surface tracking-tight">Earnings</h3>
<div class="flex bg-surface-container-highest p-1 rounded-lg">
<button class="px-4 py-1 text-[11px] font-bold rounded-md bg-surface-container-lowest text-primary shadow-sm">DAILY</button>
<button class="px-4 py-1 text-[11px] font-bold text-on-surface-variant">WEEKLY</button>
</div>
</div>
<div class="flex flex-col gap-1">
<span class="text-4xl font-extrabold text-primary">$184.50</span>
<div class="flex items-center gap-1.5 text-emerald-700 text-xs font-bold">
<span class="material-symbols-outlined text-[16px]" data-icon="trending_up">trending_up</span>
<span>12% from yesterday</span>
</div>
</div>
<div class="h-16 w-full flex items-end justify-between gap-1 pt-2">
<div class="w-full bg-primary-fixed-dim h-[30%] rounded-t-sm"></div>
<div class="w-full bg-primary-fixed-dim h-[45%] rounded-t-sm"></div>
<div class="w-full bg-primary-fixed-dim h-[35%] rounded-t-sm"></div>
<div class="w-full bg-primary-fixed-dim h-[60%] rounded-t-sm"></div>
<div class="w-full bg-primary-fixed-dim h-[50%] rounded-t-sm"></div>
<div class="w-full bg-primary-fixed-dim h-[85%] rounded-t-sm"></div>
<div class="w-full bg-primary h-[100%] rounded-t-sm"></div>
</div>
</section>
<!-- Quick Action Grid -->
<section class="space-y-4 pb-12">
<h3 class="font-bold text-lg text-on-surface tracking-tight">Quick Actions</h3>
<div class="grid grid-cols-1 gap-3">
<button class="flex items-center justify-between p-5 bg-surface-container-lowest rounded-xl shadow-ambient active:scale-[0.98] transition-all border border-transparent hover:border-primary/10 group text-left">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-primary-container/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="add_shopping_cart">add_shopping_cart</span>
</div>
<span class="font-bold text-on-surface">New Manual Order</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary" data-icon="chevron_right">chevron_right</span>
</button>
<button class="flex items-center justify-between p-5 bg-surface-container-lowest rounded-xl shadow-ambient active:scale-[0.98] transition-all border border-transparent hover:border-primary/10 group text-left">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-primary-container/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="event_available">event_available</span>
</div>
<span class="font-bold text-on-surface">Set Availability</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary" data-icon="chevron_right">chevron_right</span>
</button>
<button class="flex items-center justify-between p-5 bg-surface-container-lowest rounded-xl shadow-ambient active:scale-[0.98] transition-all border border-transparent hover:border-primary/10 group text-left">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-primary-container/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="edit_note">edit_note</span>
</div>
<span class="font-bold text-on-surface">Update Price List</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</section>
</main>
<!-- BottomNavBar from COMPONENTS_27 -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-slate-100/90 dark:bg-slate-900/90 backdrop-blur-xl rounded-t-[1.5rem] shadow-ambient">
<div class="flex justify-around items-center px-2 pb-4 pt-2 w-full max-w-md mx-auto">
<!-- Home (Active) -->
<a class="flex flex-col items-center justify-center bg-white dark:bg-emerald-900/30 text-emerald-800 dark:text-emerald-200 rounded-xl px-3 py-1.5 transition-all duration-200 active:scale-90 tap-highlight-none" href="#">
<span class="material-symbols-outlined" data-icon="home" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-inter text-[10px] font-semibold uppercase tracking-wider">Home</span>
</a>
<!-- Shopping -->
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-3 py-1.5 hover:bg-white/50 dark:hover:bg-slate-800/50 transition-all duration-200 active:scale-90 tap-highlight-none" href="#">
<span class="material-symbols-outlined" data-icon="shopping_basket">shopping_basket</span>
<span class="font-inter text-[10px] font-semibold uppercase tracking-wider">Shopping</span>
</a>
<!-- Clients -->
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-3 py-1.5 hover:bg-white/50 dark:hover:bg-slate-800/50 transition-all duration-200 active:scale-90 tap-highlight-none" href="#">
<span class="material-symbols-outlined" data-icon="people">people</span>
<span class="font-inter text-[10px] font-semibold uppercase tracking-wider">Clients</span>
</a>
<!-- Data -->
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-3 py-1.5 hover:bg-white/50 dark:hover:bg-slate-800/50 transition-all duration-200 active:scale-90 tap-highlight-none" href="#">
<span class="material-symbols-outlined" data-icon="bar_chart">bar_chart</span>
<span class="font-inter text-[10px] font-semibold uppercase tracking-wider">Data</span>
</a>
<!-- Profile -->
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-3 py-1.5 hover:bg-white/50 dark:hover:bg-slate-800/50 transition-all duration-200 active:scale-90 tap-highlight-none" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-inter text-[10px] font-semibold uppercase tracking-wider">Profile</span>
</a>
</div>
</nav>
</body></html>
