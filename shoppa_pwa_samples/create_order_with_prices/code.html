<body class="bg-surface text-on-surface min-h-screen pb-40">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-slate-50/80 dark:bg-slate-900/80 backdrop-blur-md">
<div class="flex justify-between items-center px-4 h-16 w-full max-w-md mx-auto">
<div class="flex items-center gap-3">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-emerald-900">arrow_back</span>
</button>
<h1 class="font-manrope font-bold text-lg text-emerald-900 tracking-tight">New Order</h1>
</div>
<div class="w-8 h-8 rounded-full overflow-hidden border-2 border-primary-fixed">
<img alt="Profile" data-alt="Close up professional headshot of a friendly man with a neat beard and soft natural lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD4hHkjL-1l1NGoOene_uXuFiDTYYvCbpTiUxKSKnirAsRXcZlHuGg_1_BffzS1uo8i1JseKh-wP9bECVBMYEnEQPlAY5S6ma2JIMv4EWivfy_ifM_nBbZYv_MXy3-OOxvvma1rW8c2hEC5u7hEoxCr4wcjMlhC9MeuZr8EgAZHrYdir4kYRbj6YYAU-naRu-Br7rNB5Wsx0LtlcCtgLxRtfSrHp07wvG2KhZuVaOzG0efRHL3ZmwljVV9Tt_SX_SLYMzXmvx2GIzrE"/>
</div>
</div>
</header>
<main class="pt-20 px-4 max-w-md mx-auto space-y-6">
<!-- Progress Indicator -->
<section class="bg-surface-container-low p-4 rounded-2xl">
<div class="flex justify-between items-center mb-3 px-1">
<span class="text-[10px] font-bold uppercase tracking-widest text-primary">Item Entry</span>
<span class="text-[10px] font-bold uppercase tracking-widest text-outline">Step 1 of 3</span>
</div>
<div class="flex gap-2 h-1.5 w-full bg-surface-variant rounded-full overflow-hidden">
<div class="h-full w-1/3 bg-primary rounded-full"></div>
<div class="h-full w-0 bg-primary-container/30 rounded-full"></div>
<div class="h-full w-0 bg-primary-container/30 rounded-full"></div>
</div>
</section>
<!-- Status Sheet -->
<div class="bg-secondary-container/40 p-4 rounded-xl flex items-center gap-4">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">info</span>
<p class="text-sm font-medium text-on-secondary-container leading-snug">Choose your preferred way to add items to this order.</p>
</div>
<!-- Multi-modal Entry Grid (Bento Style) -->
<div class="grid grid-cols-2 gap-4">
<!-- Manual Entry -->
<button class="col-span-2 bg-surface-container-lowest p-6 rounded-3xl shadow-ambient flex items-center justify-between hover:bg-slate-50 transition-colors active:scale-[0.98] duration-200">
<div class="text-left">
<div class="w-12 h-12 bg-primary-fixed flex items-center justify-center rounded-2xl mb-3">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">add_circle</span>
</div>
<h3 class="font-bold text-lg text-emerald-900 leading-tight">Add Item<br/>Manually</h3>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</button>
<!-- Paste List -->
<button class="bg-surface-container-lowest p-5 rounded-3xl shadow-ambient text-left hover:bg-slate-50 transition-colors active:scale-[0.98] duration-200">
<div class="w-10 h-10 bg-secondary-fixed flex items-center justify-center rounded-xl mb-3">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">content_paste</span>
</div>
<h3 class="font-bold text-base text-emerald-900 leading-tight">Paste<br/>List</h3>
<p class="text-[10px] mt-1 text-slate-500 uppercase font-bold tracking-tighter">Bulk Import</p>
</button>
<!-- Upload Image -->
<button class="bg-surface-container-lowest p-5 rounded-3xl shadow-ambient text-left hover:bg-slate-50 transition-colors active:scale-[0.98] duration-200">
<div class="w-10 h-10 bg-tertiary-fixed flex items-center justify-center rounded-xl mb-3">
<span class="material-symbols-outlined text-tertiary" style="font-variation-settings: 'FILL' 1;">add_a_photo</span>
</div>
<h3 class="font-bold text-base text-emerald-900 leading-tight">Upload<br/>Screenshot</h3>
<p class="text-[10px] mt-1 text-slate-500 uppercase font-bold tracking-tighter">AI Vision</p>
</button>
</div>
<!-- Recent/Quick Add Section -->
<section class="space-y-4">
<div class="flex items-center justify-between">
<h2 class="font-manrope font-extrabold text-xl text-emerald-900">Frequently Ordered</h2>
<button class="text-primary font-semibold text-sm">View All</button>
</div>
<div class="bg-surface-container-low rounded-3xl p-2 space-y-2">

<div class="flex gap-2 items-center">

<span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs font-bold">$</span>

</div>
<div class="flex items-center bg-surface-container-low rounded-xl px-2">
<button class="w-6 h-8 flex items-center justify-center text-slate-500"><span class="material-symbols-outlined text-sm">remove</span></button>
<span class="text-xs font-bold w-6 text-center text-emerald-900">1</span>
<button class="w-6 h-8 flex items-center justify-center text-slate-500"><span class="material-symbols-outlined text-sm">add</span></button>
</div>
</div>

</div>
<div class="flex-grow">
<h4 class="font-bold text-sm text-emerald-900">Whole Milk, 1 Gal</h4>
<p class="text-xs text-slate-500">Dairy • $4.20</p>
</div>
<button class="w-10 h-10 rounded-full bg-emerald-50 text-primary flex items-center justify-center active:scale-90 transition-transform">
<span class="material-symbols-outlined">add</span>
</button>
</div>
<div class="flex gap-2 items-center">
<div class="relative flex-grow">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs font-bold">$</span>
<input class="w-full bg-surface-container-low border-none rounded-xl py-2 pl-6 pr-3 text-xs placeholder:text-slate-400 focus:ring-1 focus:ring-primary/20" placeholder="Suggested Price (Optional)" type="number"/>
</div>
<div class="flex items-center bg-surface-container-low rounded-xl px-2">
<button class="w-6 h-8 flex items-center justify-center text-slate-500"><span class="material-symbols-outlined text-sm">remove</span></button>
<span class="text-xs font-bold w-6 text-center text-emerald-900">1</span>

</div>

<div class="flex-grow">
<h4 class="font-bold text-sm text-emerald-900">Artisan Sourdough</h4>
<p class="text-xs text-slate-500">Bakery • $6.50</p>
</div>
<button class="w-10 h-10 rounded-full bg-emerald-50 text-primary flex items-center justify-center active:scale-90 transition-transform">
<span class="material-symbols-outlined">add</span>
</button>
</div>
<div class="flex gap-2 items-center">
<div class="relative flex-grow">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs font-bold">$</span>
<input class="w-full bg-surface-container-low border-none rounded-xl py-2 pl-6 pr-3 text-xs placeholder:text-slate-400 focus:ring-1 focus:ring-primary/20" placeholder="Suggested Price (Optional)" type="number"/>
</div>
<div class="flex items-center bg-surface-container-low rounded-xl px-2">
<button class="w-6 h-8 flex items-center justify-center text-slate-500"><span class="material-symbols-outlined text-sm">remove</span></button>
<span class="text-xs font-bold w-6 text-center text-emerald-900">1</span>
<button class="w-6 h-8 flex items-center justify-center text-slate-500"><span class="material-symbols-outlined text-sm">add</span></button>
</div>
</div>
</div>

<div class="max-w-md mx-auto flex items-center justify-between gap-4">
<div class="flex flex-col">
<span class="text-[10px] font-bold uppercase tracking-wider text-slate-500">Items in Cart</span>
<span class="font-manrope font-extrabold text-2xl text-emerald-900">12 items</span>
</div>
<button class="flex-grow h-14 rounded-2xl bg-gradient-to-r from-primary to-primary-container text-white font-manrope font-bold text-lg shadow-lg active:scale-95 duration-200 flex items-center justify-center gap-2">
                Continue Order
                <span class="material-symbols-outlined text-xl">trending_flat</span>
</button>
</div>
</footer>
</body></html>
