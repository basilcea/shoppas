<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-dim": "#d9dadb",
                    "error-container": "#ffdad6",
                    "surface-variant": "#e1e3e4",
                    "on-surface": "#191c1d",
                    "outline": "#6e7976",
                    "on-secondary-fixed": "#01201b",
                    "surface-container-low": "#f3f4f5",
                    "secondary-fixed": "#c9e9e1",
                    "on-tertiary": "#ffffff",
                    "surface-container": "#edeeef",
                    "on-secondary-container": "#4b6862",
                    "on-primary-container": "#95e8d8",
                    "error": "#ba1a1a",
                    "surface-container-high": "#e7e8e9",
                    "primary": "#005147",
                    "on-tertiary-fixed": "#390b00",
                    "on-secondary-fixed-variant": "#2f4c46",
                    "primary-container": "#006b5e",
                    "on-primary-fixed": "#00201b",
                    "inverse-primary": "#83d5c5",
                    "primary-fixed": "#9ff2e1",
                    "surface-bright": "#f8f9fa",
                    "tertiary-fixed-dim": "#ffb59e",
                    "surface-container-lowest": "#ffffff",
                    "on-error-container": "#93000a",
                    "on-surface-variant": "#3e4946",
                    "on-primary-fixed-variant": "#005046",
                    "on-primary": "#ffffff",
                    "inverse-surface": "#2e3132",
                    "primary-fixed-dim": "#83d5c5",
                    "surface": "#f8f9fa",
                    "on-secondary": "#ffffff",
                    "inverse-on-surface": "#f0f1f2",
                    "secondary-container": "#c6e7de",
                    "on-background": "#191c1d",
                    "tertiary-container": "#8f4c36",
                    "tertiary-fixed": "#ffdbd0",
                    "background": "#f8f9fa",
                    "on-tertiary-fixed-variant": "#723521",
                    "secondary": "#46645e",
                    "secondary-fixed-dim": "#adcdc5",
                    "tertiary": "#723521",
                    "on-error": "#ffffff",
                    "outline-variant": "#bec9c5",
                    "surface-tint": "#006b5e",
                    "surface-container-highest": "#e1e3e4",
                    "on-tertiary-container": "#ffcebf"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "1.5rem",
                    "md": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            },
            "boxShadow": {
                "ambient": "0 20px 40px rgba(25, 28, 29, 0.06)"
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-login-gradient {
            background: linear-gradient(135deg, #005147 0%, #006b5e 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center">
<header class="fixed top-0 w-full z-50 bg-slate-50/80 backdrop-blur-md">
<div class="flex justify-between items-center px-4 h-16 w-full max-w-md mx-auto">
<div class="text-xl font-extrabold text-emerald-900 tracking-tight font-headline">Shoppa</div>
<div class="w-8 h-8 rounded-full bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-sm">language</span>
</div>
</div>
</header>
<main class="w-full max-w-md flex-1 flex flex-col px-6 pt-24 pb-12">
<div class="mt-8 mb-10">
<h1 class="font-headline font-extrabold text-4xl text-primary tracking-tight leading-tight">
                Welcome <br/> Back
            </h1>
<p class="text-on-surface-variant mt-2 font-medium">Log in to manage your daily operations.</p>
</div>
<section class="space-y-4">
<div class="relative">
<label class="block text-xs font-bold text-primary mb-1 ml-1 uppercase tracking-widest font-label">Email Address</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline">mail</span>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-highest border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-md font-medium text-on-surface transition-all" placeholder="name@company.com" type="email"/>
</div>
</div>
<div class="relative">
<label class="block text-xs font-bold text-primary mb-1 ml-1 uppercase tracking-widest font-label">Password</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline">lock</span>
<input class="w-full h-14 pl-12 pr-12 bg-surface-container-highest border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-md font-medium text-on-surface transition-all" placeholder="••••••••" type="password"/>
<button class="absolute right-4 text-outline hover:text-primary transition-colors">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="flex justify-end pt-1">
<a class="text-sm font-semibold text-primary hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<button class="w-full h-14 bg-login-gradient text-white font-headline font-bold text-lg rounded-xl shadow-ambient active:scale-95 duration-200 mt-6 flex items-center justify-center gap-2">
                Login
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</section>
<div class="relative flex items-center py-8">
<div class="flex-grow border-t border-outline-variant opacity-30"></div>
<span class="flex-shrink mx-4 text-xs font-bold text-outline uppercase tracking-widest font-label">Or continue with</span>
<div class="flex-grow border-t border-outline-variant opacity-30"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 h-14 bg-surface-container-lowest shadow-ambient rounded-md hover:bg-surface-container transition-colors active:scale-95 duration-200">
<div class="w-6 h-6 flex items-center justify-center">
<span class="material-symbols-outlined text-primary" data-weight="fill" style="font-variation-settings: 'FILL' 1;">google</span>
</div>
<span class="font-bold text-sm text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-3 h-14 bg-surface-container-lowest shadow-ambient rounded-md hover:bg-surface-container transition-colors active:scale-95 duration-200">
<div class="w-6 h-6 flex items-center justify-center">
<span class="material-symbols-outlined text-primary" data-weight="fill" style="font-variation-settings: 'FILL' 1;">ios</span>
</div>
<span class="font-bold text-sm text-on-surface">Apple ID</span>
</button>
</div>
<div class="mt-auto pt-12 flex flex-col items-center">
<p class="text-on-surface-variant text-sm font-medium">
                Don't have an account? 
                <a class="text-primary font-bold ml-1" href="#">Create Account</a>
</p>
</div>
</main>
<div class="fixed bottom-12 w-full max-w-xs flex justify-center pointer-events-none opacity-20">
<div class="h-1 w-24 bg-primary rounded-full"></div>
</div>
<div class="w-full max-w-md mx-auto h-64 overflow-hidden absolute -bottom-32 -z-10 blur-3xl opacity-20">
<div class="w-full h-full bg-emerald-500 rounded-full"></div>
</div>
</body></html>
