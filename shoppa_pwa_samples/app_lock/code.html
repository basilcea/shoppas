        body { font-family: 'Inter', sans-serif; }
        .font-manrope { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

    </style>

<body class="bg-background text-on-surface flex items-center justify-center min-h-screen">
<div class="w-full max-w-md min-h-screen flex flex-col items-center justify-between py-16 px-8 relative overflow-hidden">
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-[150%] h-[40%] bg-gradient-to-b from-primary/5 to-transparent rounded-full blur-3xl -z-10"></div>
<div class="flex flex-col items-center text-center space-y-6">
<div class="w-16 h-16 bg-surface-container-lowest rounded-xl flex items-center justify-center shadow-ambient">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
<div class="space-y-2">
<h1 class="text-emerald-900 font-headline font-extrabold text-2xl tracking-tighter">Shoppa</h1>
<p class="text-on-surface-variant font-medium">Security Required</p>
</div>
<div class="flex space-x-4 mt-8">
<div class="w-4 h-4 rounded-full border-2 border-primary-container bg-transparent"></div>
<div class="w-4 h-4 rounded-full border-2 border-primary-container bg-transparent"></div>
<div class="w-4 h-4 rounded-full border-2 border-primary-container bg-transparent"></div>

</div>
</div>

<button class="w-16 h-16 flex items-center justify-center rounded-full text-xl font-headline font-bold text-emerald-900 hover:bg-surface-container-high transition-colors active:scale-90">1</button>
<button class="w-16 h-16 flex items-center justify-center rounded-full text-xl font-headline font-bold text-emerald-900 hover:bg-surface-container-high transition-colors active:scale-90">2</button>
<button class="w-16 h-16 flex items-center justify-center rounded-full text-xl font-headline font-bold text-emerald-900 hover:bg-surface-container-high transition-colors active:scale-90">3</button>

<button class="w-16 h-16 flex items-center justify-center rounded-full text-xl font-headline font-bold text-emerald-900 hover:bg-surface-container-high transition-colors active:scale-90">5</button>
<button class="w-16 h-16 flex items-center justify-center rounded-full text-xl font-headline font-bold text-emerald-900 hover:bg-surface-container-high transition-colors active:scale-90">6</button>
<button class="w-16 h-16 flex items-center justify-center rounded-full text-xl font-headline font-bold text-emerald-900 hover:bg-surface-container-high transition-colors active:scale-90">7</button>
<button class="w-16 h-16 flex items-center justify-center rounded-full text-xl font-headline font-bold text-emerald-900 hover:bg-surface-container-high transition-colors active:scale-90">8</button>
<button class="w-16 h-16 flex items-center justify-center rounded-full text-xl font-headline font-bold text-emerald-900 hover:bg-surface-container-high transition-colors active:scale-90">9</button>

<span class="material-symbols-outlined text-on-surface-variant hover:text-primary transition-colors cursor-pointer" data-icon="fingerprint">fingerprint</span>
</div>

<button class="w-16 h-16 flex items-center justify-center rounded-full text-on-surface-variant hover:text-error transition-colors active:scale-90">
<span class="material-symbols-outlined" data-icon="backspace">backspace</span>
</button>
</div>
<div class="flex flex-col items-center space-y-4">
<button class="text-sm font-semibold text-primary hover:text-primary-container transition-colors tracking-wide">

            </button>
<div class="flex items-center space-x-2 px-4 py-2 bg-surface-container-low rounded-full">
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
<span class="text-xs font-medium text-on-surface-variant uppercase tracking-widest">Awaiting Biometrics</span>
</div>
</div>
</div>

<div class="bg-surface-container-lowest shadow-ambient p-6 rounded-xl max-w-xs border-l-4 border-primary">
