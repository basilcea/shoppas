<svg xmlns="http://www.w3.org/2000/svg" width="360" height="720" viewBox="0 0 360 720" role="img" aria-label="Shoppa mobile screen with live session, checklist, approvals, route, and KPIs">
  <defs>
    <linearGradient id="appbar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#005147"/>
      <stop offset="1" stop-color="#006b5e"/>
    </linearGradient>
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#005147"/>
      <stop offset="1" stop-color="#006b5e"/>
    </linearGradient>
  </defs>

  <!-- Screen background -->
  <rect x="0" y="0" width="360" height="720" fill="#ffffff"/>

  <!-- App bar -->
  <rect x="0" y="0" width="360" height="64" fill="url(#appbar)"/>
  <circle cx="20" cy="32" r="6" fill="#ffffff" opacity="0.92"/>
  <rect x="36" y="22" width="160" height="12" rx="6" fill="#95e8d8" opacity="0.95"/>
  <text x="36" y="52" font-family="Inter, Arial, sans-serif" font-size="12" fill="#e6fffa" opacity="0.9">Shop Session • Live</text>

  <!-- KPI chips -->
  <g transform="translate(16,76)">
    <rect x="0" y="0" width="150" height="44" rx="12" fill="#f3f4f5"/>
    <text x="12" y="18" font-family="Inter, Arial, sans-serif" font-size="11" fill="#3e4946">Earnings Today</text>
    <text x="12" y="34" font-family="Manrope, Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#005147">$240.50</text>
  </g>
  <g transform="translate(194,76)">
    <rect x="0" y="0" width="150" height="44" rx="12" fill="#f3f4f5"/>
    <text x="12" y="18" font-family="Inter, Arial, sans-serif" font-size="11" fill="#3e4946">Efficiency</text>
    <text x="12" y="34" font-family="Manrope, Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#46645e">94%</text>
  </g>

  <!-- Section title -->
  <text x="16" y="148" font-family="Manrope, Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#0b1c1d">Master Checklist</text>

  <!-- Item 1 (checked) -->
  <g transform="translate(16,168)">
    <rect x="0" y="0" width="328" height="72" rx="12" fill="#ffffff" stroke="#e1e3e4"/>
    <circle cx="28" cy="36" r="12" fill="#16a34a"/>
    <path d="M22 36 l4 4 l8 -8" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="52" y="30" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#0b1c1d">Gala Apples (Organic)</text>
    <text x="52" y="48" font-family="Inter, Arial, sans-serif" font-size="12" fill="#6e7976">Qty: 6 • Produce</text>
  </g>

  <!-- Item 2 (substitution proposed) -->
  <g transform="translate(16,256)">
    <rect x="0" y="0" width="328" height="112" rx="12" fill="#ffffff" stroke="#e1e3e4"/>
    <circle cx="28" cy="36" r="12" fill="#adcdc5"/>
    <text x="52" y="30" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#0b1c1d">Whole Milk 2%</text>
    <text x="52" y="48" font-family="Inter, Arial, sans-serif" font-size="12" fill="#6e7976">1 Gallon • Dairy</text>
    <rect x="16" y="64" width="92" height="28" rx="8" fill="#005147"/>
    <text x="32" y="82" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Approve</text>
    <rect x="116" y="64" width="92" height="28" rx="8" fill="#e1e3e4"/>
    <text x="138" y="82" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#0b1c1d">Decline</text>
    <rect x="216" y="16" width="96" height="24" rx="12" fill="#ffdbd0"/>
    <text x="226" y="32" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#723521">SUBSTITUTE</text>
  </g>

  <!-- Item 3 (pending photo) -->
  <g transform="translate(16,384)">
    <rect x="0" y="0" width="328" height="112" rx="12" fill="#ffffff" stroke="#e1e3e4"/>
    <circle cx="28" cy="36" r="12" fill="#e1e3e4"/>
    <text x="52" y="30" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#0b1c1d">Sourdough Loaf</text>
    <text x="52" y="48" font-family="Inter, Arial, sans-serif" font-size="12" fill="#6e7976">Bakery • 1 loaf</text>
    <rect x="16" y="64" width="208" height="28" rx="8" fill="#adcdc5"/>
    <text x="24" y="82" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#01201b">Awaiting shopper photo…</text>
  </g>

  <!-- Live chat/media row -->
  <g transform="translate(16,512)">
    <rect x="0" y="0" width="328" height="64" rx="12" fill="#f8f9fa" stroke="#e1e3e4"/>
    <rect x="12" y="12" width="40" height="40" rx="8" fill="#e7e8e9"/>
    <text x="60" y="28" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#0b1c1d">Is this brand ok?</text>
    <text x="60" y="44" font-family="Inter, Arial, sans-serif" font-size="11" fill="#6e7976">Photo sent • 2m ago</text>
  </g>

  <!-- Route banner -->
  <g transform="translate(16,592)">
    <rect x="0" y="0" width="328" height="44" rx="12" fill="#f3f4f5"/>
    <rect x="10" y="12" width="20" height="20" rx="10" fill="#005147"/>
    <text x="40" y="28" font-family="Inter, Arial, sans-serif" font-size="12" fill="#3e4946">Optimized route • ETA 18m</text>
  </g>

  <!-- Bottom primary CTA -->
  <g transform="translate(16,648)">
    <rect x="0" y="0" width="328" height="44" rx="22" fill="url(#cta)"/>
    <text x="164" y="28" font-family="Manrope, Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#ffffff" text-anchor="middle">Approve All</text>
  </g>
</svg>
