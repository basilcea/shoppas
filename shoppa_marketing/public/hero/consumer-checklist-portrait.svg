<svg xmlns="http://www.w3.org/2000/svg" width="360" height="720" viewBox="0 0 360 720" role="img" aria-label="Mobile app screen with shopper items list and approve/decline actions">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#005147"/>
      <stop offset="1" stop-color="#006b5e"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="360" height="720" fill="#ffffff"/>
  <rect x="0" y="0" width="360" height="72" fill="url(#g)"/>
  <text x="24" y="46" font-size="18" font-family="Inter, Arial, sans-serif" fill="#ffffff" font-weight="700">Items &amp; Approvals</text>

  <!-- Item card 1 -->
  <rect x="16" y="96" rx="16" ry="16" width="328" height="128" fill="#f3f4f5"/>
  <rect x="28" y="112" rx="8" ry="8" width="72" height="72" fill="#e7e8e9"/>
  <text x="112" y="132" font-size="14" font-family="Inter, Arial, sans-serif" fill="#191c1d" font-weight="700">Organic Gala Apples</text>
  <text x="112" y="152" font-size="12" font-family="Inter, Arial, sans-serif" fill="#3e4946">Qty: 3 • Brand: Any</text>
  <rect x="112" y="168" rx="12" ry="12" width="92" height="28" fill="#005147"/>
  <text x="128" y="187" font-size="12" font-family="Inter, Arial, sans-serif" fill="#ffffff" font-weight="700">Approve</text>
  <rect x="212" y="168" rx="12" ry="12" width="92" height="28" fill="#e1e3e4"/>
  <text x="232" y="187" font-size="12" font-family="Inter, Arial, sans-serif" fill="#191c1d" font-weight="600">Decline</text>

  <!-- Item card 2 -->
  <rect x="16" y="240" rx="16" ry="16" width="328" height="128" fill="#f3f4f5"/>
  <rect x="28" y="256" rx="8" ry="8" width="72" height="72" fill="#e7e8e9"/>
  <text x="112" y="276" font-size="14" font-family="Inter, Arial, sans-serif" fill="#191c1d" font-weight="700">Whole Milk 2%</text>
  <text x="112" y="296" font-size="12" font-family="Inter, Arial, sans-serif" fill="#3e4946">1 gallon • Brand: Horizon</text>
  <rect x="112" y="312" rx="12" ry="12" width="92" height="28" fill="#005147"/>
  <text x="128" y="331" font-size="12" font-family="Inter, Arial, sans-serif" fill="#ffffff" font-weight="700">Approve</text>
  <rect x="212" y="312" rx="12" ry="12" width="92" height="28" fill="#e1e3e4"/>
  <text x="232" y="331" font-size="12" font-family="Inter, Arial, sans-serif" fill="#191c1d" font-weight="600">Decline</text>

  <!-- Item card 3 (pending) -->
  <rect x="16" y="384" rx="16" ry="16" width="328" height="128" fill="#f3f4f5"/>
  <rect x="28" y="400" rx="8" ry="8" width="72" height="72" fill="#e7e8e9"/>
  <text x="112" y="420" font-size="14" font-family="Inter, Arial, sans-serif" fill="#191c1d" font-weight="700">Sourdough Loaf</text>
  <text x="112" y="440" font-size="12" font-family="Inter, Arial, sans-serif" fill="#3e4946">Bakery • 1 loaf</text>
  <rect x="112" y="456" rx="12" ry="12" width="192" height="28" fill="#adcdc5"/>
  <text x="140" y="475" font-size="12" font-family="Inter, Arial, sans-serif" fill="#01201b" font-weight="700">Awaiting shopper photo…</text>

  <!-- Footer hint -->
  <text x="24" y="540" font-size="11" font-family="Inter, Arial, sans-serif" fill="#6e7976">Tip: Tap Approve to confirm a suggested replacement</text>
</svg>
