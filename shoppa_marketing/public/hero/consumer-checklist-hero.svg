<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Illustration of a person using a mobile shopping app with a checklist">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#005147"/>
      <stop offset="1" stop-color="#006b5e"/>
    </linearGradient>
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#005147"/>
      <stop offset="1" stop-color="#006b5e"/>
    </linearGradient>
    <clipPath id="phone-clip">
      <rect x="0" y="0" width="300" height="600" rx="28" ry="28"/>
    </clipPath>
    <symbol id="check" viewBox="0 0 24 24">
      <path fill="currentColor" d="M20.285 6.708a1.2 1.2 0 0 1 0 1.697l-9.2 9.2a1.2 1.2 0 0 1-1.697 0l-4.4-4.4a1.2 1.2 0 1 1 1.697-1.697l3.551 3.55 8.351-8.351a1.2 1.2 0 0 1 1.698 0z"/>
    </symbol>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1280" height="720" fill="url(#bg)"/>
  <!-- Ambient circles -->
  <circle cx="150" cy="120" r="140" fill="#ffffff" opacity="0.06"/>
  <circle cx="1180" cy="640" r="200" fill="#ffffff" opacity="0.06"/>

  <!-- Person silhouette (stylized, neutral) -->
  <g transform="translate(180,90)">
    <!-- Shadow -->
    <ellipse cx="210" cy="560" rx="180" ry="32" fill="#000" opacity="0.10"/>
    <!-- Body -->
    <path d="M140 240c0-44 36-80 80-80s80 36 80 80v80h12c30 0 54 24 54 54v126c0 40-32 72-72 72H146c-40 0-72-32-72-72V374c0-30 24-54 54-54h12z" fill="#0f4f47" opacity="0.95"/>
    <!-- Head -->
    <circle cx="220" cy="180" r="56" fill="#0b3b35"/>
    <!-- Hair/cap accent -->
    <path d="M168 172c10-28 40-46 72-44 24 2 44 14 56 30-18-6-42-6-64 2-20 8-42 14-64 12z" fill="#08332e" opacity="0.9"/>
    <!-- Arm to phone -->
    <path d="M300 330c24 8 44 20 64 34 20 14 38 30 56 48 8 8 8 22-2 30-8 8-22 8-30-1-28-28-64-52-104-66-10-4-16-16-12-26 4-10 16-16 28-12z" fill="#0b3b35"/>
    <!-- Hand -->
    <circle cx="412" cy="446" r="20" fill="#0b3b35"/>
  </g>

  <!-- Phone (foreground) -->
  <g transform="translate(720,60)">
    <!-- Shadow -->
    <ellipse cx="150" cy="620" rx="170" ry="28" fill="#000" opacity="0.12"/>
    <!-- Frame -->
    <rect x="0" y="0" width="300" height="600" rx="36" ry="36" fill="#0b0f10" opacity="0.25"/>
    <g transform="translate(0,0)" clip-path="url(#phone-clip)">
      <rect x="0" y="0" width="300" height="600" fill="#ffffff"/>
      <!-- Status bar/top -->
      <rect x="0" y="0" width="300" height="64" fill="#f3f4f5"/>
      <circle cx="150" cy="24" r="4" fill="#cdd1d4"/>
      <rect x="90" y="12" width="120" height="8" rx="4" fill="#cdd1d4"/>
      <!-- Header -->
      <text x="24" y="100" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#0b1c1d">Shopping Checklist</text>

      <!-- Item 1 -->
      <g transform="translate(24,124)">
        <circle cx="20" cy="20" r="18" fill="#16a34a"/>
        <use href="#check" x="8" y="8" width="24" height="24" fill="#ffffff"/>
        <rect x="52" y="8" width="180" height="12" rx="6" fill="#0f1f20" opacity="0.85"/>
        <rect x="52" y="26" width="120" height="10" rx="5" fill="#6e7976" opacity="0.6"/>
      </g>
      <!-- Item 2 -->
      <g transform="translate(24,184)">
        <circle cx="20" cy="20" r="18" fill="#16a34a"/>
        <use href="#check" x="8" y="8" width="24" height="24" fill="#ffffff"/>
        <rect x="52" y="8" width="180" height="12" rx="6" fill="#0f1f20" opacity="0.85"/>
        <rect x="52" y="26" width="140" height="10" rx="5" fill="#6e7976" opacity="0.6"/>
      </g>
      <!-- Item 3 (pending) -->
      <g transform="translate(24,244)">
        <circle cx="20" cy="20" r="18" fill="#e1e3e4"/>
        <rect x="52" y="8" width="190" height="12" rx="6" fill="#0f1f20" opacity="0.85"/>
        <rect x="52" y="26" width="110" height="10" rx="5" fill="#6e7976" opacity="0.6"/>
      </g>
      <!-- Item 4 (suggested replacement) -->
      <g transform="translate(24,304)">
        <circle cx="20" cy="20" r="18" fill="#adcdc5"/>
        <rect x="52" y="8" width="200" height="12" rx="6" fill="#0f1f20" opacity="0.85"/>
        <rect x="52" y="26" width="150" height="10" rx="5" fill="#6e7976" opacity="0.6"/>
        <rect x="52" y="44" width="84" height="24" rx="12" fill="#005147"/>
        <text x="64" y="60" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Approve</text>
        <rect x="144" y="44" width="84" height="24" rx="12" fill="#e1e3e4"/>
        <text x="164" y="60" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#0f1f20">Decline</text>
      </g>

      <!-- Divider -->
      <rect x="24" y="380" width="252" height="1" fill="#e1e3e4"/>

      <!-- Notes -->
      <text x="24" y="410" font-family="Inter, Arial, sans-serif" font-size="12" fill="#3e4946">Tip: tap Approve to confirm a replacement</text>

      <!-- Bottom actions -->
      <g transform="translate(24,520)">
        <rect x="0" y="0" width="252" height="44" rx="22" fill="url(#cta)"/>
        <text x="126" y="28" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#ffffff" text-anchor="middle">Approve All</text>
      </g>
    </g>
  </g>

  <!-- Title copy on background (for hero composition options) -->
  <text x="140" y="560" font-family="Manrope, Inter, Arial, sans-serif" font-size="56" font-weight="800" fill="#ffffff" opacity="0.08">Operational Excellence</text>
</svg>
