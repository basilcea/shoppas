<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" role="img" aria-label="Real-time operations approvals, chat, and progress">
  <defs>
    <linearGradient id="g-primary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#005147"/>
      <stop offset="1" stop-color="#006b5e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="#ffffff"/>
  <rect x="0" y="0" width="800" height="56" fill="#f3f4f5"/>
  <text x="24" y="36" font-family="Manrope, Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#0b1c1d">Real-time Operations</text>

  <!-- Two-column layout -->
  <g transform="translate(24,80)">
    <!-- Left: approvals list -->
    <g>
      <rect x="0" y="0" width="360" height="320" rx="12" fill="#ffffff" stroke="#e1e3e4"/>
      <text x="16" y="28" font-family="Manrope, Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#0b1c1d">Approvals</text>

      <g transform="translate(16,44)">
        <rect x="0" y="0" width="328" height="64" rx="12" fill="#f8f9fa" stroke="#e1e3e4"/>
        <circle cx="20" cy="32" r="10" fill="#adcdc5"/>
        <text x="40" y="28" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#0b1c1d">Whole Milk 2%</text>
        <text x="40" y="46" font-family="Inter, Arial, sans-serif" font-size="11" fill="#6e7976">1 Gallon • Dairy</text>
        <rect x="208" y="18" width="48" height="28" rx="8" fill="#005147"/>
        <text x="220" y="36" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Approve</text>
        <rect x="264" y="18" width="64" height="28" rx="8" fill="#e1e3e4"/>
        <text x="278" y="36" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#0b1c1d">Decline</text>
      </g>

      <g transform="translate(16,116)">
        <rect x="0" y="0" width="328" height="64" rx="12" fill="#f8f9fa" stroke="#e1e3e4"/>
        <circle cx="20" cy="32" r="10" fill="#16a34a"/>
        <text x="40" y="28" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#0b1c1d">Gala Apples</text>
        <text x="40" y="46" font-family="Inter, Arial, sans-serif" font-size="11" fill="#6e7976">Qty: 6 • Produce</text>
        <text x="240" y="36" font-family="Inter, Arial, sans-serif" font-size="11" fill="#46645e">Approved</text>
      </g>

      <g transform="translate(16,188)">
        <rect x="0" y="0" width="328" height="64" rx="12" fill="#f8f9fa" stroke="#e1e3e4"/>
        <circle cx="20" cy="32" r="10" fill="#e1e3e4"/>
        <text x="40" y="28" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#0b1c1d">Sourdough Loaf</text>
        <text x="40" y="46" font-family="Inter, Arial, sans-serif" font-size="11" fill="#6e7976">Awaiting photo…</text>
      </g>
    </g>

    <!-- Right: live chat & progress -->
    <g transform="translate(392,0)">
      <rect x="0" y="0" width="360" height="320" rx="12" fill="#ffffff" stroke="#e1e3e4"/>
      <text x="16" y="28" font-family="Manrope, Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#0b1c1d">Live Updates</text>

      <!-- Chat bubble -->
      <g transform="translate(16,48)">
        <rect x="0" y="0" width="240" height="56" rx="12" fill="#f3f4f5"/>
        <text x="12" y="20" font-family="Inter, Arial, sans-serif" font-size="12" fill="#0b1c1d">Client • Can you swap for lactose-free?</text>
        <text x="12" y="36" font-family="Inter, Arial, sans-serif" font-size="11" fill="#6e7976">1m ago</text>
      </g>

      <!-- Progress bar -->
      <g transform="translate(16,124)">
        <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="11" fill="#6e7976">Cart Progress</text>
        <rect x="0" y="10" width="328" height="10" rx="5" fill="#e1e3e4"/>
        <rect x="0" y="10" width="210" height="10" rx="5" fill="#83d5c5"/>
      </g>

      <!-- ETA chip -->
      <g transform="translate(16,164)">
        <rect x="0" y="0" width="110" height="28" rx="14" fill="#ffdbd0"/>
        <text x="12" y="18" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#723521">ETA 22m</text>
      </g>
    </g>
  </g>

  <!-- Footer CTA -->
  <rect x="24" y="408" width="240" height="32" rx="16" fill="url(#g-primary)"/>
  <text x="144" y="428" text-anchor="middle" font-family="Manrope, Inter, Arial, sans-serif" font-size="12" font-weight="800" fill="#ffffff">Send Update</text>
</svg>
