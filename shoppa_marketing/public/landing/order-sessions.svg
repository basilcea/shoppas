<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" role="img" aria-label="Order Sessions calendar with open windows highlighted">
  <defs>
    <linearGradient id="g-primary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#005147"/>
      <stop offset="1" stop-color="#006b5e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="#ffffff"/>
  <!-- Header -->
  <rect x="0" y="0" width="800" height="56" fill="#f3f4f5"/>
  <text x="24" y="36" font-family="Manrope, Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#0b1c1d">Order Sessions</text>
  
  <!-- Calendar grid (7x5) -->
  <g transform="translate(24,80)">
    <rect x="0" y="0" width="520" height="320" rx="12" fill="#ffffff" stroke="#e1e3e4"/>
    <!-- Column labels -->
    <g fill="#6e7976" font-family="Inter, Arial, sans-serif" font-size="11">
      <text x="20" y="22">Mon</text>
      <text x="94" y="22">Tue</text>
      <text x="168" y="22">Wed</text>
      <text x="242" y="22">Thu</text>
      <text x="316" y="22">Fri</text>
      <text x="390" y="22">Sat</text>
      <text x="464" y="22">Sun</text>
    </g>
    <!-- Cells -->
    <g transform="translate(8,36)" stroke="#e1e3e4" stroke-width="1">
      <!-- Draw verticals -->
      <path d="M68 0 V 280"/>
      <path d="M142 0 V 280"/>
      <path d="M216 0 V 280"/>
      <path d="M290 0 V 280"/>
      <path d="M364 0 V 280"/>
      <path d="M438 0 V 280"/>
      <!-- Draw horizontals -->
      <path d="M0 56 H 504"/>
      <path d="M0 112 H 504"/>
      <path d="M0 168 H 504"/>
      <path d="M0 224 H 504"/>
    </g>
    <!-- Open windows highlights -->
    <g>
      <rect x="16" y="44" width="60" height="40" rx="8" fill="#9ff2e1"/>
      <text x="20" y="68" font-size="11" font-family="Inter, Arial, sans-serif" fill="#005147" font-weight="700">Open</text>

      <rect x="236" y="156" width="60" height="40" rx="8" fill="#9ff2e1"/>
      <text x="240" y="180" font-size="11" font-family="Inter, Arial, sans-serif" fill="#005147" font-weight="700">Open</text>

      <rect x="452" y="212" width="60" height="40" rx="8" fill="#9ff2e1"/>
      <text x="456" y="236" font-size="11" font-family="Inter, Arial, sans-serif" fill="#005147" font-weight="700">Open</text>
    </g>
  </g>

  <!-- Side panel: upcoming windows -->
  <g transform="translate(568,80)">
    <rect x="0" y="0" width="208" height="320" rx="12" fill="#f8f9fa" stroke="#e1e3e4"/>
    <text x="16" y="28" font-family="Manrope, Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#0b1c1d">Upcoming Windows</text>
    <g font-family="Inter, Arial, sans-serif" font-size="12" fill="#0b1c1d">
      <rect x="16" y="44" width="176" height="36" rx="8" fill="#ffffff" stroke="#e1e3e4"/>
      <text x="28" y="66">Mon • 8–10 AM</text>
      <rect x="16" y="88" width="176" height="36" rx="8" fill="#ffffff" stroke="#e1e3e4"/>
      <text x="28" y="110">Wed • 1–3 PM</text>
      <rect x="16" y="132" width="176" height="36" rx="8" fill="#ffffff" stroke="#e1e3e4"/>
      <text x="28" y="154">Fri • 6–8 PM</text>
      <rect x="16" y="176" width="176" height="36" rx="8" fill="#ffffff" stroke="#e1e3e4"/>
      <text x="28" y="198">Sat • 9–11 AM</text>
    </g>
    <rect x="16" y="264" width="176" height="40" rx="20" fill="url(#g-primary)"/>
    <text x="104" y="289" text-anchor="middle" font-family="Manrope, Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#ffffff">Create New Window</text>
  </g>

  <!-- Footer note -->
  <text x="24" y="428" font-family="Inter, Arial, sans-serif" font-size="12" fill="#6e7976">Batch closes in 2h • Clients notified automatically</text>
</svg>
