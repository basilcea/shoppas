<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" role="img" aria-label="Shop Sessions route optimization through multiple stores">
  <defs>
    <linearGradient id="g-primary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#005147"/>
      <stop offset="1" stop-color="#006b5e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="#ffffff"/>
  <rect x="0" y="0" width="800" height="56" fill="#f3f4f5"/>
  <text x="24" y="36" font-family="Manrope, Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#0b1c1d">Shop Sessions</text>

  <!-- Map canvas -->
  <g transform="translate(24,80)">
    <rect x="0" y="0" width="520" height="320" rx="12" fill="#f8f9fa" stroke="#e1e3e4"/>
    <!-- Landmark pins -->
    <g>
      <circle cx="80" cy="70" r="8" fill="#8f4c36"/>
      <circle cx="210" cy="120" r="8" fill="#46645e"/>
      <circle cx="360" cy="180" r="8" fill="#8f4c36"/>
      <circle cx="470" cy="260" r="8" fill="#46645e"/>
    </g>
    <!-- Optimized path -->
    <path d="M80 70 C 120 90, 170 100, 210 120 S 300 170, 360 180 S 420 230, 470 260" fill="none" stroke="#83d5c5" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Run summary -->
  <g transform="translate(568,80)">
    <rect x="0" y="0" width="208" height="320" rx="12" fill="#ffffff" stroke="#e1e3e4"/>
    <text x="16" y="28" font-family="Manrope, Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#0b1c1d">Run Summary</text>
    <g font-family="Inter, Arial, sans-serif" font-size="12" fill="#0b1c1d">
      <text x="16" y="56">Stops</text>
      <text x="160" y="56" text-anchor="end" font-weight="700">4</text>
      <rect x="16" y="66" width="176" height="1" fill="#e1e3e4"/>

      <text x="16" y="96">Distance</text>
      <text x="160" y="96" text-anchor="end" font-weight="700">12.4 km</text>
      <rect x="16" y="106" width="176" height="1" fill="#e1e3e4"/>

      <text x="16" y="136">ETA</text>
      <text x="160" y="136" text-anchor="end" font-weight="700">47 min</text>
      <rect x="16" y="146" width="176" height="1" fill="#e1e3e4"/>
    </g>
    <rect x="16" y="264" width="176" height="40" rx="20" fill="url(#g-primary)"/>
    <text x="104" y="289" text-anchor="middle" font-family="Manrope, Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#ffffff">Start Shop Session</text>
  </g>

  <text x="24" y="428" font-family="Inter, Arial, sans-serif" font-size="12" fill="#6e7976">Routes adapt to live traffic and inventory signals</text>
</svg>
